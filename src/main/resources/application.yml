server:
  port: 8080

spring:
  application:
    name: mini-game-backend
  
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false
  
  datasource:
    url: jdbc:sqlite:example_db.sqlite
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: password
  
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    com.example.minigame: DEBUG
    org.hibernate.SQL: DEBUG